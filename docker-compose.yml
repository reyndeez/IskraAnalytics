version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iskra_postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: IskraAnalyticsDb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .  # Корневая папка (D:/IskraAnalytics)
      dockerfile: backend/IskraAnalytics/IskraAnalytics.API/Dockerfile
    ports:
      - "5000:8080" # ASP.NET Core по умолчанию в контейнере слушает 8080
    environment:
      - ASPNETCORE_URLS=http://+:8080
    restart: always
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    restart: always
    depends_on:
      - backend

volumes:
  pgdata: